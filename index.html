
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明新資教中心 - 測驗工具管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- 頁首 -->
        <header class="mb-10 text-center">
            <div class="inline-block p-2 px-4 bg-blue-600 text-white rounded-full text-sm font-bold mb-4 shadow-lg">明新科技大學 資源教室</div>
            <h1 class="text-4xl font-extrabold text-slate-800 mb-3">心理測驗工具管理網</h1>
            <p class="text-slate-500 text-lg">快速查詢館藏測驗、適用對象及消耗品庫存</p>
        </header>

        <!-- 搜尋與過濾區 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-1 w-full">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </span>
                <input v-model="searchQuery" type="text" placeholder="輸入測驗名稱關鍵字..." class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition">
            </div>
            
            <div class="flex gap-4 w-full md:w-auto">
                <select v-model="selectedCategory" class="block w-full md:w-48 pl-3 pr-10 py-3 text-base border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-xl bg-slate-50">
                    <option value="">所有類別</option>
                    <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
                </select>
                
                <button @click="reloadData" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-xl transition text-slate-600 shadow-sm" title="重新整理資料">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </div>

        <!-- 狀態提示 -->
        <div v-if="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <p class="text-slate-500">正在從 Google Sheets 讀取最新資料...</p>
        </div>

        <div v-else-if="filteredItems.length === 0" class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
            <p class="text-slate-400 text-xl">找不到符合條件的測驗</p>
            <button @click="searchQuery = ''; selectedCategory = ''" class="mt-4 text-blue-500 font-bold hover:underline">清除所有過濾條件</button>
        </div>

        <!-- 卡片網格 -->
        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="(item, index) in filteredItems" :key="index" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden card-hover flex flex-col">
                <!-- 圖片區 -->
                <div class="h-52 bg-slate-200 relative">
                    <img :src="item['圖片(網址)'] || 'https://via.placeholder.com/400x300?text=No+Image'" class="w-full h-full object-cover">
                    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm text-xs font-bold text-slate-700">
                        {{ item['類別'] }}
                    </div>
                </div>

                <!-- 內容區 -->
                <div class="p-6 flex-1 flex flex-col">
                    <h2 class="text-xl font-bold text-slate-800 mb-2 leading-tight">{{ item['測驗名稱'] }}</h2>
                    <p class="text-slate-500 text-sm mb-4">適用對象：{{ item['適用對象'] }}</p>
                    
                    <div class="mt-auto space-y-3">
                        <!-- 庫存標示 -->
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <span class="text-sm text-slate-600 font-medium">消耗品剩餘份數</span>
                            <span :class="getStockClass(item['消耗品份數'])" class="text-lg font-black tracking-tighter">
                                {{ item['消耗品份數'] || 0 }}
                            </span>
                        </div>
                        
                        <div class="flex items-center text-xs text-slate-400 space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            <span>存放位置：{{ item['存放位置'] || '未註記' }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer class="mt-20 border-t border-slate-200 pt-8 text-center text-slate-400 text-sm">
            <p>© 明新科技大學 資源教室 - 測驗管理系統</p>
            <p class="mt-1">架設於 GitHub Pages • 資料來源：Google Sheets</p>
        </footer>
    </div>

    <script>
        // 【重要】請將下方 URL 換成你 Google 試算表「發布到網路」的 CSV 連結
        const SHEET_CSV_URL = '你的_GOOGLE_SHEET_CSV_連結_放這裡';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const items = ref([]);
                const loading = ref(true);
                const searchQuery = ref('');
                const selectedCategory = ref('');

                const fetchData = () => {
                    loading.value = true;
                    if (SHEET_CSV_URL === '你的_GOOGLE_SHEET_CSV_連結_放這裡') {
                        setTimeout(() => {
                            items.value = [
                                { "測驗名稱": "魏氏成人智力測驗 (WAIS-IV)", "類別": "認知功能", "適用對象": "大專/成人", "消耗品份數": 5, "存放位置": "A1 櫃", "圖片(網址)": "" },
                                { "測驗名稱": "大專校院生涯不確定感量表", "類別": "生涯發展", "適用對象": "大專生", "消耗品份數": 12, "存放位置": "B2 櫃", "圖片(網址)": "" },
                                { "測驗名稱": "貝克焦慮量表 (BAI)", "類別": "情緒評量", "適用對象": "成人", "消耗品份數": 0, "存放位置": "A2 櫃", "圖片(網址)": "" }
                            ];
                            loading.value = false;
                        }, 800);
                        return;
                    }

                    Papa.parse(SHEET_CSV_URL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            items.value = results.data.filter(row => row['測驗名稱']);
                            loading.value = false;
                        },
                        error: (err) => {
                            alert("讀取資料失敗，請檢查 Google Sheets 發布設定。");
                            loading.value = false;
                        }
                    });
                };

                const categories = computed(() => {
                    const cats = items.value.map(i => i['類別']).filter(Boolean);
                    return [...new Set(cats)];
                });

                const filteredItems = computed(() => {
                    return items.value.filter(item => {
                        const mSearch = item['測驗名稱'] ? item['測驗名稱'].toLowerCase().includes(searchQuery.value.toLowerCase()) : false;
                        const mCat = selectedCategory.value === '' || item['類別'] === selectedCategory.value;
                        return mSearch && mCat;
                    });
                });

                const getStockClass = (num) => {
                    const n = parseInt(num);
                    if (isNaN(n) || n <= 0) return 'text-red-500';
                    if (n < 5) return 'text-orange-500';
                    return 'text-green-600';
                };

                const reloadData = () => fetchData();

                onMounted(() => fetchData());

                return { items, loading, searchQuery, selectedCategory, categories, filteredItems, getStockClass, reloadData };
            }
        }).mount('#app');
    </script>
</body>
</html>
