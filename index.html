<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明新資教中心 - 測驗工具管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <div class="inline-block p-2 px-4 bg-blue-600 text-white rounded-full text-sm font-bold mb-4 shadow-lg">明新科技大學 資源教室</div>
            <h1 class="text-4xl font-extrabold text-slate-800 mb-3">心理測驗工具管理網</h1>
            <p class="text-slate-500 text-lg">快速查詢館藏測驗、適用對象及消耗品庫存</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-1 w-full">
                <input v-model="searchQuery" type="text" placeholder="輸入測驗名稱關鍵字..." class="block w-full pl-4 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <select v-model="selectedCategory" class="block w-full md:w-48 px-3 py-3 border border-slate-200 rounded-xl bg-slate-50 outline-none">
                <option value="">所有類別</option>
                <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
            </select>
        </div>

        <div v-if="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
            <p class="text-slate-500">正在讀取最新資料，請稍候...</p>
        </div>

        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="(item, index) in filteredItems" :key="index" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden card-hover flex flex-col">
                <div class="h-52 bg-white">
                    <img :src="getImage(item)" class="w-full h-full object-contain">
                </div>
                <div class="p-6 flex-1 flex flex-col">
                    <span class="text-xs font-bold text-blue-600 mb-1">{{ getVal(item, '類別') }}</span>
                    <h2 class="text-xl font-bold text-slate-800 mb-2">{{ getVal(item, '測驗名稱') }}</h2>
                    <p class="text-slate-500 text-sm mb-4">適用對象：{{ getVal(item, '適用對象') }}</p>
                    <div class="mt-auto bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-slate-600">消耗品剩餘</span>
                            <span :class="getStockClass(getVal(item, '消耗品份數'))" class="text-lg font-black">
                                {{ getVal(item, '消耗品份數') || 0 }}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 您的正確 CSV 網址
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLOoDvq_H51sPghKba2sbVAWlcFw6ptR3jYgbDvzL5J4AoPQ1umeBDNE_6hyi6D3miwGXBMdGb5PQR/pub?output=csv';

        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const items = ref([]);
                const loading = ref(true);
                const searchQuery = ref('');
                const selectedCategory = ref('');

                // 寬鬆抓取資料的方法
                const getVal = (item, key) => item[key] || item[Object.keys(item).find(k => k.includes(key))] || '';
                
                const getImage = (item) => {
                    const url = getVal(item, '圖片');
                    return url && url.startsWith('http') ? url : 'https://via.placeholder.com/400x300?text=No+Image';
                };

                const fetchData = () => {
                    if (typeof Papa === 'undefined') {
                        setTimeout(fetchData, 500); // 如果 Papa 還沒好，等一下再試
                        return;
                    }
                    Papa.parse(SHEET_CSV_URL, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            items.value = results.data.filter(row => Object.values(row).some(v => v));
                            loading.value = false;
                        }
                    });
                };

                const categories = computed(() => [...new Set(items.value.map(i => getVal(i, '類別')).filter(Boolean))]);
                
                const filteredItems = computed(() => {
                    return items.value.filter(item => {
                        const name = getVal(item, '測驗名稱').toLowerCase();
                        const cat = getVal(item, '類別');
                        return name.includes(searchQuery.value.toLowerCase()) && (selectedCategory.value === '' || cat === selectedCategory.value);
                    });
                });

                const getStockClass = (num) => {
                    const n = parseInt(num);
                    return isNaN(n) || n <= 0 ? 'text-red-500' : (n < 5 ? 'text-orange-500' : 'text-green-600');
                };

                onMounted(() => fetchData());
                return { loading, searchQuery, selectedCategory, categories, filteredItems, getVal, getImage, getStockClass };
            }
        }).mount('#app');
    </script>
</body>
</html>
